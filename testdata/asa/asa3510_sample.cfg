! ASA 3510 sample config - used for missing-object ref regression tests
object network HOST-WEB
 host 192.168.1.10

object network NET-DMZ
 subnet 192.168.1.0 255.255.255.0

object network RANGE-1
 range 10.0.0.1 10.0.0.100

object service SVC-HTTP
 service tcp destination eq 80

object-group network GRP-SERVERS
 network-object host 192.168.1.10
 network-object 192.168.1.0 255.255.255.0

object-group service GRP-WEB tcp
 port-object eq 80
 port-object eq 443

access-list OUTSIDE_IN extended permit tcp any any eq 80
access-list OUTSIDE_IN extended permit tcp any any eq 443
access-list OUTSIDE_IN extended deny ip any any

nat (inside,outside) source static HOST-WEB HOST-WEB
nat (inside,outside) 1 source dynamic any interface
